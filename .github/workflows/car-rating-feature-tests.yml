name: Car Rating Feature Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging
  schedule:
    - cron: '0 2 * * *'

jobs:
  feature-tests:
    name: Run Car Rating Feature Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      pull-requests: write
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run car rating feature tests
        id: run-tests
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://buggy.justtestit.org' }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: npm test

      - name: Generate Allure report
        if: always()
        run: npm run report:allure

      - name: Upload Allure report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: reports/allure-report/
          retention-days: 30

      - name: Upload Allure report for GitHub Pages
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/allure-report/

      - name: Deploy Allure report to GitHub Pages
        if: always() && github.event_name != 'pull_request'
        id: deploy-pages
        uses: actions/deploy-pages@v4

      - name: Write job summary
        if: always()
        run: |
          if [ -f reports/cucumber-report.json ]; then
            PASSED=$(node -e "
              const r = require('./reports/cucumber-report.json');
              const s = r.flatMap(f => f.elements || []);
              console.log(s.filter(x => x.steps.every(st => st.result.status === 'passed')).length);
            ")
            FAILED=$(node -e "
              const r = require('./reports/cucumber-report.json');
              const s = r.flatMap(f => f.elements || []);
              console.log(s.filter(x => x.steps.some(st => st.result.status === 'failed')).length);
            ")
            TOTAL=$(node -e "
              const r = require('./reports/cucumber-report.json');
              console.log(r.flatMap(f => f.elements || []).length);
            ")
            STATUS=$([[ "$FAILED" == "0" ]] && echo "✅ All scenarios passed" || echo "❌ $FAILED scenario(s) failed")
          else
            PASSED=0; FAILED=0; TOTAL=0
            STATUS="⚠️ No test results found"
          fi
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Car Rating Feature Test Results
          **${STATUS}**

          | Passed | Failed | Total |
          |--------|--------|-------|
          | ${PASSED} | ${FAILED} | ${TOTAL} |

          📊 [View Allure Report](https://kishoresdet.github.io/neos-buggy-car-rating-tests/)
          EOF

      - name: Parse test results for PR summary
        if: always() && github.event_name == 'pull_request'
        id: parse-results
        run: |
          if [ -f reports/cucumber-report.json ]; then
            TOTAL=$(node -e "
              const r = require('./reports/cucumber-report.json');
              const scenarios = r.flatMap(f => f.elements || []);
              const passed = scenarios.filter(s => s.steps.every(st => st.result.status === 'passed')).length;
              const failed = scenarios.filter(s => s.steps.some(st => st.result.status === 'failed')).length;
              console.log(passed + '|' + failed + '|' + scenarios.length);
            ")
            echo "results=$TOTAL" >> $GITHUB_OUTPUT
          else
            echo "results=0|0|0" >> $GITHUB_OUTPUT
          fi

      - name: Post test results to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const results = '${{ steps.parse-results.outputs.results }}';
            const [passed, failed, total] = results.split('|').map(Number);
            const status = failed === 0 ? '✅ All scenarios passed' : `❌ ${failed} scenario(s) failed`;
            const body = [
              '## Car Rating Feature Test Results',
              '',
              `**${status}**`,
              '',
              `| Passed | Failed | Total |`,
              `|--------|--------|-------|`,
              `| ${passed} | ${failed} | ${total} |`,
              '',
              `📋 Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              `📦 Allure report (this PR): download from [artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              `📊 Allure report (live — last main run): https://kishoresdet.github.io/neos-buggy-car-rating-tests/`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload Cucumber report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: car-rating-test-report-${{ github.run_number }}
          path: reports/
          retention-days: 30

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: reports/screenshots/
          retention-days: 7
